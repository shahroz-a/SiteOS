          items:
            $ref: '#/components/schemas/AnalyticsTimePoint'

    PostAnalytics:
      type: object
      description: View totals for a single post.
      required:
        - slug
        - total
        - last7Days
        - last30Days
      properties:
        slug:
          type: string
        total:
          type: integer
          description: All-time view count.
        last7Days:
          type: integer
          description: Views in the last 7 days.
        last30Days:
          type: integer
          description: Views in the last 30 days.

    AnalyticsLeader:
      type: object
      description: A leaderboard row ranked by page views.
      required:
        - slug
        - name
        - views
      properties:
        slug:
          type: string
        name:
          type: string
        views:
          type: integer

    AnalyticsReferrer:
      type: object
      description: A referrer-host row ranked by page views.
      required:
        - host
        - views
      properties:
        host:
          type: string
          description: >-
            Coarse referrer host (e.g. "www.google.com"). Empty string means the
            view had no referrer (direct, same-origin or app traffic).
        views:
          type: integer

    AnalyticsSeo:
      type: object
      description: SEO completeness across published-eligible posts.
      required:
        - averageScore
        - fullyOptimized
        - needsWork
        - total
      properties:
        averageScore:
          type: integer
          description: Mean SEO completeness score (0-100) across all posts.
        fullyOptimized:
          type: integer
          description: Posts scoring 80 or above.
        needsWork:
          type: integer
          description: Posts scoring below 50.
        total:
          type: integer

    AnalyticsHealth:
      type: object
      description: Content-health counters.
      required:
        - brokenLinks
        - validationFailures
        - drafts
        - scheduled
      properties:
        brokenLinks:
          type: integer
        validationFailures:
          type: integer
        drafts:
          type: integer
        scheduled:
          type: integer

    CmsAnalytics:
      type: object
      required:
        - generatedAt
        - views
        - topPages
        - topAuthors
        - topCategories
        - topTags
        - topReferrers
        - seo
        - publishingVelocity
        - contentGrowth
        - health
      properties:
        generatedAt:
          type: string
          format: date-time
        views:
          $ref: '#/components/schemas/AnalyticsViews'
        topPages:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsLeader'
        topAuthors:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsLeader'
        topCategories:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsLeader'
        topTags:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsLeader'
        topReferrers:
          type: array
          description: Top referrer hosts driving views.
          items:
            $ref: '#/components/schemas/AnalyticsReferrer'
        seo:
          $ref: '#/components/schemas/AnalyticsSeo'
        publishingVelocity:
          type: array
          description: Posts published per month for the last 12 months.
          items:
            $ref: '#/components/schemas/AnalyticsTimePoint'
        contentGrowth:
          type: array
          description: Cumulative post count at each month end for the last 12 months.
          items:
            $ref: '#/components/schemas/AnalyticsTimePoint'
        health:
          $ref: '#/components/schemas/AnalyticsHealth'

    DeactivatedRedirect:
      type: object
      required:
        - id
        - fromPath
        - toPath
        - statusCode
        - isActive
        - kind
        - deactivatedReason
        - deactivatedAt
        - targetLastStatus
        - targetCheckedAt
        - targetCheckFailures
      properties:
        id:
          type: string
        fromPath:
          type: string
        toPath:
          type: string
        statusCode:
          type: integer
        isActive:
          type: boolean
        kind:
          type: string
          enum: [on-blog, off-blog]
          description: Whether the target resolves on the blog or to an external origin.
        deactivatedReason:
          type: [string, "null"]
          enum: [on-blog-target-missing, off-blog-target-dead, null]
          description: Why the auto-deactivator flipped isActive to false. Null while active.
        deactivatedAt:
          type: [string, "null"]
          format: date-time
        targetLastStatus:
          type: [integer, "null"]
          description: Last observed final HTTP status for an off-blog target (null for on-blog).
        targetCheckedAt:
          type: [string, "null"]
          format: date-time
        targetCheckFailures:
          type: integer
          description: Consecutive confirmed-dead readings of the target.

    DeactivatedRedirectListResponse:
      type: object
      required: [deactivated, atRisk]
      properties:
        deactivated:
          type: array
          description: Redirects auto-deactivated because their target is confirmed dead.
          items:
            $ref: "#/components/schemas/DeactivatedRedirect"
        atRisk:
          type: array
          description: >-
            Still-active off-blog redirects that failed at least once but
            haven't reached the deactivation threshold yet.
          items:
            $ref: "#/components/schemas/DeactivatedRedirect"
