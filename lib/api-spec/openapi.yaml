  /cms/held-back-articles:
    get:
      tags: [cms]
      operationId: listCmsHeldBackArticles
      summary: List articles held back from the public API for editor review (requires review.approve)
      description: >-
        The review queue of articles kept out of the public read API because
        content-fidelity validation failed (pages.status="draft"). Each entry's
        verdict is re-scored at request time through the current validator, so
        the displayed status/score/issues always reflect the live rules — never
        a stale verdict from an older validator.
      parameters:
        - name: q
          in: query
          required: false
          description: Case-insensitive search across article title and slug.
          schema:
            type: string
        - name: issue
          in: query
          required: false
          description: >-
            Filter to articles whose current failing checks include this field
            (re-scored live). E.g. "title" (missing title) or "components"
            (empty/near-empty component tree).
          schema:
            type: string
            enum: [title, components]
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: The list of held-back articles, newest first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeldBackArticleListResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/dashboard:
    get:
      tags: [cms]
      operationId: getCmsDashboard
      summary: Operational dashboard aggregates (requires content.view)
      description: >-
        A single, server-aggregated snapshot powering the CMS home dashboard:
        content/taxonomy counts, content-quality signals, the crawl/publishing
        pipeline state, database health and storage usage, plus recently edited
        and recently published articles and a content activity feed.
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: The dashboard snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsDashboard"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/held-back-articles/{id}:
    patch:
      tags: [cms]
      operationId: resolveCmsHeldBackArticle
      summary: Publish or dismiss a held-back article (requires review.approve)
      description: >-
        Act on an article in the review queue. "publish" flips
        pages.status from draft to published, releasing it to the public read
        API despite failing content-fidelity validation (an explicit editor
        override). "dismiss" flips it to archived so it leaves the queue without
        becoming public. Both actions are audited via the append-only audit log.
      parameters:
        - name: id
          in: path
          required: true
          description: The page id of the held-back article to act on.
          schema:
            type: string
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveHeldBackArticleRequest"
      responses:
        "200":
          description: The article after the decision was applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveHeldBackArticleResponse"
        "400":
          description: Invalid action.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Article not found or not in the review queue.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/held-back-articles/{id}/approve:
    post:
      tags: [cms]
      operationId: approveCmsHeldBackArticle
      summary: Approve a held-back article if it now passes validation (requires review.approve)
      description: >-
        Re-validate a held-back article server-side using the CURRENT
        content-fidelity rules (re-scoring the latest captured source/parsed
        tallies) and, only if it now passes (no failing checks), flip
        pages.status from draft to published so it leaves the review queue and
        becomes public. Unlike the "publish" override on PATCH
        /cms/held-back-articles/{id}, this never publishes an article that still
        fails — it returns approved=false with the live verdict instead, leaving
        the article a draft. A successful approval is audited via the
        append-only audit log. Restricted to articles still in the review queue
        (pages.status="draft", page_type="post").
      parameters:
        - name: id
          in: path
          required: true
          description: The page id of the held-back article to approve.
          schema:
            type: string
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: >-
            The approval outcome. When approved is true the article was
            published; when false it still fails validation and stays a draft.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveHeldBackArticleResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Article not found or not in the review queue.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/held-back-articles/{id}/source:
    get:
      tags: [cms]
      operationId: getCmsHeldBackArticleSource
      summary: Source vs parsed bodies for one held-back article (requires review.approve)
      description: >-
        The faithful source body (cleaned article HTML, falling back to the raw
        original HTML when no cleaned body exists) alongside the parsed
        structured representations (componentTree and richText) the importer
        extracted. Lets an editor render the source next to the parsed output and
        visually spot what the importer dropped or garbled before deciding to
        publish or dismiss. Restricted to articles still in the review queue
        (pages.status="draft", page_type="post").
      parameters:
        - name: id
          in: path
          required: true
          description: The page id of the held-back article.
          schema:
            type: string
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: The article's source and parsed bodies.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeldBackArticleSource"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Article not found or not in the review queue.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/redirects/deactivated:
    get:
      tags: [cms]
      operationId: listCmsDeactivatedRedirects
      summary: List auto-deactivated and at-risk redirects for review (requires url.manage)
      description: >-
        The redirect-target-health job auto-deactivates redirects whose
        destinations are confirmed dead, recording `deactivatedReason` /
        `deactivatedAt` on the row. This returns those auto-deactivated
        redirects so an operator can review and undo them, plus off-blog
        "at-risk" redirects (still active, failed at least once but below the
        deactivation threshold) so they can be watched.
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: The auto-deactivated and at-risk redirect lists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeactivatedRedirectListResponse"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/redirects/{id}/reactivate:
    post:
      tags: [cms]
      operationId: reactivateCmsRedirect
      summary: Re-activate an auto-deactivated redirect (requires url.manage)
      description: >-
        Flip `isActive` back to true and clear the health bookkeeping
        (`deactivatedReason`, `deactivatedAt`, `targetCheckFailures`) so the
        redirect serves again. The change is written to the audit log.
      parameters:
        - $ref: "#/components/parameters/CmsIdParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: The re-activated redirect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeactivatedRedirect"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          $ref: "#/components/responses/CmsNotFound"

  /cms/held-back-articles/{id}/reparse:
    post:
      tags: [cms]
      operationId: reparseCmsHeldBackArticle
      summary: Re-parse or hand-edit a held-back article's body (requires review.approve)
      description: >-
        Re-extract a held-back article's structured body and persist the result,
        letting an editor fix a garbled import without leaving the review screen.
        With no request body (or {} ), the stored source HTML (cleaned article
        HTML, falling back to the raw original HTML) is re-run through the live
        parser. When an `html` body is supplied, that hand-edited HTML is parsed
        instead. Either way the page's componentTree, richText and cleanedHtml are
        replaced, the blocks and component-tree rows are rewritten, and a fresh
        content-fidelity validation_reports row is appended so re-running the
        fidelity check reflects the correction. The article stays a draft (the
        editor publishes separately). Restricted to articles still in the review
        queue (pages.status="draft", page_type="post"). Audited via the
        append-only audit log.
      parameters:
        - name: id
          in: path
          required: true
          description: The page id of the held-back article to re-parse.
          schema:
            type: string
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReparseHeldBackArticleRequest"
      responses:
        "200":
          description: The re-parsed bodies and fresh validation verdict.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReparseHeldBackArticleResponse"
        "400":
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Article not found or not in the review queue.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: The supplied or stored HTML could not be parsed into any content.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

