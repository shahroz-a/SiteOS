openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: posts
    description: Blog post read operations
  - name: categories
    description: Category read operations
  - name: authors
    description: Author read operations
  - name: search
    description: Search operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List posts
      description: List and paginate published posts, optionally filtered by category, author or tag slug.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: category
          in: query
          required: false
          description: Filter by category slug
          schema:
            type: string
        - name: author
          in: query
          required: false
          description: Filter by author slug
          schema:
            type: string
        - name: tag
          in: query
          required: false
          description: Filter by tag slug
          schema:
            type: string
      responses:
        "200":
          description: A paginated list of posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostListResponse"

  /posts/{slug}:
    get:
      operationId: getPostBySlug
      tags: [posts]
      summary: Get a post by slug
      description: Fetch a single post and its full content by slug. Slugs (not internal UUIDs) are the public identifier.
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: The requested post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostDetail"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories
      description: List all categories.
      responses:
        "200":
          description: A list of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /categories/{slug}:
    get:
      operationId: getCategoryBySlug
      tags: [categories]
      summary: Get a category by slug
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: The requested category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /authors:
    get:
      operationId: listAuthors
      tags: [authors]
      summary: List authors
      description: List all authors.
      responses:
        "200":
          description: A list of authors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Author"

  /authors/{slug}:
    get:
      operationId: getAuthorBySlug
      tags: [authors]
      summary: Get an author by slug
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: The requested author
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "404":
          description: Author not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /tags:
    get:
      operationId: listTags
      tags: [tags]
      summary: List tags
      description: List all tags, each with a count of published posts.
      responses:
        "200":
          description: A list of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"

  /search:
    get:
      operationId: searchPosts
      tags: [search]
      summary: Search posts
      description: Full-text-ish search across post titles, excerpts and content.
      parameters:
        - name: q
          in: query
          required: true
          description: Search query
          schema:
            type: string
            minLength: 1
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: A paginated list of matching posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostListResponse"

components:
  parameters:
    SlugParam:
      name: slug
      in: path
      required: true
      description: The resource slug (public identifier)
      schema:
        type: string
    PageParam:
      name: page
      in: query
      required: false
      description: 1-based page number
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      required: false
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 12

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      required:
        - page
        - limit
        - total
        - totalPages

    AuthorSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        avatarUrl:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
      required:
        - id
        - name
        - slug

    Author:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        originalUrl:
          type: ["string", "null"]
        social:
          type: ["object", "null"]
          additionalProperties:
            type: string
      required:
        - id
        - name
        - slug

    CategorySummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
      required:
        - id
        - name
        - slug

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        parentId:
          type: ["string", "null"]
          format: uuid
        path:
          type: ["string", "null"]
      required:
        - id
        - name
        - slug

    TagSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
      required:
        - id
        - name
        - slug

    Tag:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        postCount:
          type: integer
      required:
        - id
        - name
        - slug
        - postCount

    Breadcrumb:
      type: object
      properties:
        label:
          type: string
        url:
          type: ["string", "null"]
        position:
          type: integer
      required:
        - label
        - position

    FaqItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        question:
          type: string
        answer:
          type: string
        position:
          type: integer
      required:
        - id
        - question
        - answer
        - position

    ImageItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
        originalUrl:
          type: string
        alt:
          type: ["string", "null"]
        caption:
          type: ["string", "null"]
        credit:
          type: ["string", "null"]
        width:
          type: ["integer", "null"]
        height:
          type: ["integer", "null"]
        role:
          type: ["string", "null"]
        position:
          type: integer
      required:
        - id
        - url
        - originalUrl
        - position

    SeoMeta:
      type: object
      properties:
        metaTitle:
          type: ["string", "null"]
        metaDescription:
          type: ["string", "null"]
        canonicalUrl:
          type: ["string", "null"]
        robots:
          type: ["string", "null"]
        ogTitle:
          type: ["string", "null"]
        ogDescription:
          type: ["string", "null"]
        ogImage:
          type: ["string", "null"]
        twitterCard:
          type: ["string", "null"]
        twitterTitle:
          type: ["string", "null"]
        twitterDescription:
          type: ["string", "null"]
        twitterImage:
          type: ["string", "null"]
        keywords:
          type: ["array", "null"]
          items:
            type: string

    JsonLdItem:
      type: object
      properties:
        type:
          type: ["string", "null"]
        data:
          type: object
          additionalProperties: true
      required:
        - data

    PostSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        subtitle:
          type: ["string", "null"]
        excerpt:
          type: ["string", "null"]
        canonicalUrl:
          type: string
        pathname:
          type: string
        featuredImageUrl:
          type: ["string", "null"]
        featuredImageAlt:
          type: ["string", "null"]
        readingTimeMinutes:
          type: ["integer", "null"]
        publishedAt:
          type: ["string", "null"]
          format: date-time
        author:
          oneOf:
            - $ref: "#/components/schemas/AuthorSummary"
            - type: "null"
        primaryCategory:
          oneOf:
            - $ref: "#/components/schemas/CategorySummary"
            - type: "null"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagSummary"
      required:
        - id
        - slug
        - title
        - canonicalUrl
        - pathname
        - tags

    PostDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        subtitle:
          type: ["string", "null"]
        excerpt:
          type: ["string", "null"]
        canonicalUrl:
          type: string
        pathname:
          type: string
        parentPath:
          type: ["string", "null"]
        featuredImageUrl:
          type: ["string", "null"]
        featuredImageAlt:
          type: ["string", "null"]
        readingTimeMinutes:
          type: ["integer", "null"]
        wordCount:
          type: ["integer", "null"]
        language:
          type: string
        publishedAt:
          type: ["string", "null"]
          format: date-time
        modifiedAt:
          type: ["string", "null"]
          format: date-time
        contentHtml:
          type: ["string", "null"]
        richText:
          type: ["object", "null"]
          additionalProperties: true
        componentTree:
          type: ["object", "null"]
          additionalProperties: true
        author:
          oneOf:
            - $ref: "#/components/schemas/AuthorSummary"
            - type: "null"
        primaryCategory:
          oneOf:
            - $ref: "#/components/schemas/CategorySummary"
            - type: "null"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategorySummary"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagSummary"
        breadcrumbs:
          type: array
          items:
            $ref: "#/components/schemas/Breadcrumb"
        faq:
          type: array
          items:
            $ref: "#/components/schemas/FaqItem"
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageItem"
        seo:
          oneOf:
            - $ref: "#/components/schemas/SeoMeta"
            - type: "null"
        jsonld:
          type: array
          items:
            $ref: "#/components/schemas/JsonLdItem"
      required:
        - id
        - slug
        - title
        - canonicalUrl
        - pathname
        - language
        - categories
        - tags
        - breadcrumbs
        - faq
        - images
        - jsonld

    PostListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PostSummary"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - items
        - pagination
