          type: string
        title:
          type: string
        status:
          $ref: "#/components/schemas/PageStatus"
        pathname:
          type: string
        alt:
          type: [string, "null"]
        altStatus:
          $ref: "#/components/schemas/MediaAltStatus"

    MediaItem:
      type: object
      description: >-
        A unique CDN image (keyed by URL) aggregated across every page that
        references it. The library never re-uploads binaries; it reuses the
        existing Headout CDN URL.
      required:
        - url
        - originalUrl
        - alt
        - title
        - caption
        - credit
        - width
        - height
        - mimeType
        - role
        - usageCount
        - pageCount
        - altStatus
        - altIssues
        - pages
      properties:
        url:
          type: string
          description: The canonical CDN URL — the stable identifier for the media item.
        originalUrl:
          type: [string, "null"]
        alt:
          type: [string, "null"]
          description: The most descriptive (longest) alt text found across usages.
        title:
          type: [string, "null"]
        caption:
          type: [string, "null"]
        credit:
          type: [string, "null"]
        width:
          type: [integer, "null"]
        height:
          type: [integer, "null"]
        mimeType:
          type: [string, "null"]
        role:
          type: [string, "null"]
        usageCount:
          type: integer
          description: Total number of times this image is referenced across all pages.
        pageCount:
          type: integer
          description: Number of distinct pages that reference this image.
        altStatus:
          $ref: "#/components/schemas/MediaAltStatus"
        altIssues:
          type: array
          description: Human-readable accessibility warnings for this image's alt text.
          items:
            type: string
        pages:
          type: array
          description: Pages referencing this image (capped). Empty in list rows that omit usage detail.
          items:
            $ref: "#/components/schemas/MediaUsagePage"

