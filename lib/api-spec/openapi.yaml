openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: posts
    description: Blog post read operations
  - name: categories
    description: Category read operations
  - name: authors
    description: Author read operations
  - name: search
    description: Search operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: cms
    description: Internal CMS (Blog Studio) endpoints — authenticated, role-gated.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List posts
      description: List and paginate published posts, optionally filtered by category, author or tag slug.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: category
          in: query
          required: false
          description: Filter by category slug
          schema:
            type: string
        - name: author
          in: query
          required: false
          description: Filter by author slug
          schema:
            type: string
        - name: tag
          in: query
          required: false
          description: >-
            Filter by tag slug. Accepts a single slug, or a comma-separated list
            of slugs to match posts carrying ANY of them (OR semantics).
          schema:
            type: string
      responses:
        "200":
          description: A paginated list of posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostListResponse"

  /posts/{slug}:
    get:
      operationId: getPostBySlug
      tags: [posts]
      summary: Get a post by slug
      description: Fetch a single post and its full content by slug. Slugs (not internal UUIDs) are the public identifier.
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: The requested post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostDetail"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories
      description: List all categories.
      responses:
        "200":
          description: A list of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /categories/{slug}:
    get:
      operationId: getCategoryBySlug
      tags: [categories]
      summary: Get a category by slug
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: The requested category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /authors:
    get:
      operationId: listAuthors
      tags: [authors]
      summary: List authors
      description: List all authors.
      responses:
        "200":
          description: A list of authors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Author"

  /authors/{slug}:
    get:
      operationId: getAuthorBySlug
      tags: [authors]
      summary: Get an author by slug
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: The requested author
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "404":
          description: Author not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /tags:
    get:
      operationId: listTags
      tags: [tags]
      summary: List tags
      description: List all tags, each with a count of published posts.
      responses:
        "200":
          description: A list of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"

  /search:
    get:
      operationId: searchPosts
      tags: [search]
      summary: Search posts
      description: Full-text-ish search across post titles, excerpts and content.
      parameters:
        - name: q
          in: query
          required: true
          description: Search query
          schema:
            type: string
            minLength: 1
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: A paginated list of matching posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostListResponse"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserEnvelope"
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        "302":
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        "302":
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "302":
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileTokenExchangeRequest"
      responses:
        "200":
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileTokenExchangeSuccess"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
      responses:
        "200":
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"

  /cms/me:
    get:
      tags: [cms]
      operationId: getCmsMe
      summary: Get the current CMS user with role and effective permissions
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: The current CMS user, role and permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsMe"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/users:
    get:
      tags: [cms]
      operationId: listCmsUsers
      summary: List all CMS users and their roles (requires user management)
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: A list of CMS users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CmsUser"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/users/{userId}/role:
    patch:
      tags: [cms]
      operationId: updateCmsUserRole
      summary: Change a CMS user's role (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          description: The user id whose role is being changed.
          schema:
            type: string
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRoleRequest"
      responses:
        "200":
          description: The updated CMS user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsUser"
        "400":
          description: Invalid role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: User not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/audit-logs:
    get:
      tags: [cms]
      operationId: listCmsAuditLogs
      summary: List the audit trail of privileged CMS actions (requires audit.view)
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: A paginated list of audit log entries (newest first).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  parameters:
    SlugParam:
      name: slug
      in: path
      required: true
      description: The resource slug (public identifier)
      schema:
        type: string
    PageParam:
      name: page
      in: query
      required: false
      description: 1-based page number
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      required: false
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 12
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      required:
        - page
        - limit
        - total
        - totalPages

    AuthorSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        avatarUrl:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
      required:
        - id
        - name
        - slug

    Author:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        originalUrl:
          type: ["string", "null"]
        social:
          type: ["object", "null"]
          additionalProperties:
            type: string
      required:
        - id
        - name
        - slug

    CategorySummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
      required:
        - id
        - name
        - slug

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        parentId:
          type: ["string", "null"]
          format: uuid
        path:
          type: ["string", "null"]
      required:
        - id
        - name
        - slug

    TagSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
      required:
        - id
        - name
        - slug

    Tag:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        postCount:
          type: integer
      required:
        - id
        - name
        - slug
        - postCount

    Breadcrumb:
      type: object
      properties:
        label:
          type: string
        url:
          type: ["string", "null"]
        position:
          type: integer
      required:
        - label
        - position

    FaqItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        question:
          type: string
        answer:
          type: string
        position:
          type: integer
      required:
        - id
        - question
        - answer
        - position

    ImageItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
        originalUrl:
          type: string
        alt:
          type: ["string", "null"]
        caption:
          type: ["string", "null"]
        credit:
          type: ["string", "null"]
        width:
          type: ["integer", "null"]
        height:
          type: ["integer", "null"]
        role:
          type: ["string", "null"]
        position:
          type: integer
      required:
        - id
        - url
        - originalUrl
        - position

    SeoMeta:
      type: object
      properties:
        metaTitle:
          type: ["string", "null"]
        metaDescription:
          type: ["string", "null"]
        canonicalUrl:
          type: ["string", "null"]
        robots:
          type: ["string", "null"]
        ogTitle:
          type: ["string", "null"]
        ogDescription:
          type: ["string", "null"]
        ogImage:
          type: ["string", "null"]
        twitterCard:
          type: ["string", "null"]
        twitterTitle:
          type: ["string", "null"]
        twitterDescription:
          type: ["string", "null"]
        twitterImage:
          type: ["string", "null"]
        keywords:
          type: ["array", "null"]
          items:
            type: string

    JsonLdItem:
      type: object
      properties:
        type:
          type: ["string", "null"]
        data:
          type: object
          additionalProperties: true
      required:
        - data

    PostSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        subtitle:
          type: ["string", "null"]
        excerpt:
          type: ["string", "null"]
        canonicalUrl:
          type: string
        pathname:
          type: string
        featuredImageUrl:
          type: ["string", "null"]
        featuredImageAlt:
          type: ["string", "null"]
        readingTimeMinutes:
          type: ["integer", "null"]
        publishedAt:
          type: ["string", "null"]
          format: date-time
        author:
          oneOf:
            - $ref: "#/components/schemas/AuthorSummary"
            - type: "null"
        primaryCategory:
          oneOf:
            - $ref: "#/components/schemas/CategorySummary"
            - type: "null"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagSummary"
      required:
        - id
        - slug
        - title
        - canonicalUrl
        - pathname
        - tags

    PostDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        subtitle:
          type: ["string", "null"]
        excerpt:
          type: ["string", "null"]
        canonicalUrl:
          type: string
        pathname:
          type: string
        parentPath:
          type: ["string", "null"]
        featuredImageUrl:
          type: ["string", "null"]
        featuredImageAlt:
          type: ["string", "null"]
        readingTimeMinutes:
          type: ["integer", "null"]
        wordCount:
          type: ["integer", "null"]
        language:
          type: string
        publishedAt:
          type: ["string", "null"]
          format: date-time
        modifiedAt:
          type: ["string", "null"]
          format: date-time
        contentHtml:
          type: ["string", "null"]
        richText:
          type: ["object", "null"]
          additionalProperties: true
        componentTree:
          description: >-
            Opaque, Payload-compatible component tree consumed by the renderer.
            Stored verbatim from ingestion; the crawler emits a top-level array
            of block nodes while the importer emits a single root object, so
            this accepts an object, an array, or null.
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: "null"
        author:
          oneOf:
            - $ref: "#/components/schemas/AuthorSummary"
            - type: "null"
        primaryCategory:
          oneOf:
            - $ref: "#/components/schemas/CategorySummary"
            - type: "null"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategorySummary"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagSummary"
        breadcrumbs:
          type: array
          items:
            $ref: "#/components/schemas/Breadcrumb"
        faq:
          type: array
          items:
            $ref: "#/components/schemas/FaqItem"
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageItem"
        seo:
          oneOf:
            - $ref: "#/components/schemas/SeoMeta"
            - type: "null"
        jsonld:
          type: array
          items:
            $ref: "#/components/schemas/JsonLdItem"
      required:
        - id
        - slug
        - title
        - canonicalUrl
        - pathname
        - language
        - categories
        - tags
        - breadcrumbs
        - faq
        - images
        - jsonld

    PostListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PostSummary"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - items
        - pagination

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, "null"]
          format: email
        firstName:
          type: [string, "null"]
        lastName:
          type: [string, "null"]
        profileImageUrl:
          type: [string, "null"]
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Role:
      type: string
      enum:
        - admin
        - editor
        - writer
        - seo
        - reviewer
        - translator
        - viewer
    CmsUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl, role, createdAt]
      properties:
        id:
          type: string
        email:
          type: [string, "null"]
          format: email
        firstName:
          type: [string, "null"]
        lastName:
          type: [string, "null"]
        profileImageUrl:
          type: [string, "null"]
        role:
          $ref: "#/components/schemas/Role"
        createdAt:
          type: string
          format: date-time
    CmsMe:
      type: object
      required: [user, role, permissions]
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        role:
          $ref: "#/components/schemas/Role"
        permissions:
          type: array
          items:
            type: string
    UpdateUserRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/Role"

    AuditLogEntry:
      type: object
      required:
        - id
        - action
        - actorId
        - actorEmail
        - actorRole
        - entityType
        - entityId
        - before
        - after
        - metadata
        - ipAddress
        - createdAt
      properties:
        id:
          type: string
        action:
          type: string
          description: The privileged action performed, e.g. "user.role.update".
        actorId:
          type: [string, "null"]
        actorEmail:
          type: [string, "null"]
        actorRole:
          type: [string, "null"]
        entityType:
          type: [string, "null"]
        entityId:
          type: [string, "null"]
        before:
          type: [object, "null"]
          additionalProperties: true
        after:
          type: [object, "null"]
          additionalProperties: true
        metadata:
          type: [object, "null"]
          additionalProperties: true
        ipAddress:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time

    AuditLogListResponse:
      type: object
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
        pagination:
          $ref: "#/components/schemas/Pagination"
