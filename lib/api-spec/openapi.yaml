      type: string
      description: >-
        Accessibility classification of an image's alt text. `ok` = descriptive
        alt present; `missing` = no alt text at all; `poor` = alt text is too
        short, a generic placeholder, or just a filename.
      enum:
        - ok
        - missing
        - poor

    MediaUsagePage:
      type: object
      description: A page that references a media item, with the alt text used there.
      required:
        - id
        - slug
        - title
        - status
        - pathname
        - alt
        - altStatus
      properties:
        id:
          type: string
          format: uuid
