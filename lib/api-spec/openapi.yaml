openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: posts
    description: Blog post read operations
  - name: categories
    description: Category read operations
  - name: authors
    description: Author read operations
  - name: search
    description: Search operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: cms
    description: Internal CMS (Blog Studio) endpoints — authenticated, role-gated.
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for an image upload (requires content.create or content.edit)
      description: >-
        Returns a presigned GCS URL for a direct browser upload. The client
        sends JSON metadata here, then PUTs the file bytes directly to the
        returned URL. Gated on the CMS session: the acting user must hold
        content.create or content.edit.
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /storage/uploads:
    get:
      tags: [Storage]
      operationId: listUploadedImages
      summary: List previously uploaded images (requires content.create or content.edit)
      description: >-
        Lists images an editor has previously uploaded to object storage via the
        presigned-URL flow, newest first, so they can be reused in a block
        without re-uploading. Each item's `url` is the app-relative serving URL
        (`/api/storage/objects/...`). Gated on the CMS session: the acting user
        must hold content.create or content.edit.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: A paginated list of previously uploaded images (newest first).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadedImageListResponse"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "500":
          description: Failed to list uploaded images.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /storage/uploads/finalize:
    post:
      tags: [Storage]
      operationId: finalizeUpload
      summary: Validate an uploaded image server-side (requires content.create or content.edit)
      description: >-
        Called after the file bytes have been PUT to the presigned URL. The
        server re-reads the stored object's real size and sniffs its magic
        bytes to confirm it is a supported raster image within the size cap,
        deleting the object and returning 400 on rejection. Gated on the CMS
        session: the acting user must hold content.create or content.edit.
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadFinalizeRequest"
      responses:
        "200":
          description: The uploaded object passed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadFinalizeResult"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          description: Uploaded object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to validate uploaded object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an uploaded image from object storage
      description: >-
        Streams an object uploaded via the presigned-URL flow. Uploaded blog
        images are public content, so this endpoint is unauthenticated. The
        generated client is not used for it — reference the URL directly from
        an `<img src>`.
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
          description: Object path within the private object dir (e.g. `uploads/some-uuid`).
      responses:
        "200":
          description: Object content streamed with the correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /healthz/search:
    get:
      operationId: searchReadiness
      tags: [health]
      summary: CMS search readiness check
      description: >-
        Reports whether the CMS-search prerequisites (the `pg_trgm` extension
        and the trigram GIN indexes) are present. Returns 200 when search is
        ready and 503 with the missing prerequisites otherwise. The response
        body has the same shape in both cases.
      responses:
        "200":
          description: Search prerequisites are present and search is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchReadiness"
        "503":
          description: Search prerequisites are missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchReadiness"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List posts
      description: List and paginate published posts, optionally filtered by category, author or tag slug.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: category
          in: query
          required: false
          description: Filter by category slug
          schema:
            type: string
        - name: author
          in: query
          required: false
          description: Filter by author slug
          schema:
            type: string
        - name: tag
          in: query
          required: false
          description: >-
            Filter by tag slug. Accepts a single slug, or a comma-separated list
            of slugs to match posts carrying ANY of them (OR semantics).
          schema:
            type: string
      responses:
        "200":
          description: A paginated list of posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostListResponse"

  /posts/{slug}:
    get:
      operationId: getPostBySlug
      tags: [posts]
      summary: Get a post by slug
      description: Fetch a single post and its full content by slug. Slugs (not internal UUIDs) are the public identifier.
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: The requested post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostDetail"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories
      description: List all categories.
      responses:
        "200":
          description: A list of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /categories/{slug}:
    get:
      operationId: getCategoryBySlug
      tags: [categories]
      summary: Get a category by slug
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: The requested category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /authors:
    get:
      operationId: listAuthors
      tags: [authors]
      summary: List authors
      description: List all authors.
      responses:
        "200":
          description: A list of authors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Author"

  /authors/{slug}:
    get:
      operationId: getAuthorBySlug
      tags: [authors]
      summary: Get an author by slug
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: The requested author
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "404":
          description: Author not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /tags:
    get:
      operationId: listTags
      tags: [tags]
      summary: List tags
      description: List all tags, each with a count of published posts.
      responses:
        "200":
          description: A list of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"

  /events/page-view:
    post:
      operationId: recordPageView
      tags: [analytics]
      summary: Record a public page view
      description: >-
        Lightweight, privacy-respecting page-view capture from the public blog.
        Stores only the page slug, a coarse referrer host and a timestamp — no
        IP, user agent, cookie or per-visitor identifier. Unauthenticated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordPageViewRequest"
      responses:
        "204":
          description: View recorded (or silently ignored for an unknown slug).

  /cms/analytics:
    get:
      operationId: getCmsAnalytics
      tags: [analytics]
      summary: Content analytics aggregates for the CMS
      description: >-
        Server-side aggregates of content performance: page views and time
        series, top pages/authors/categories/tags by views, SEO completeness,
        publishing velocity, content growth, and content-health counts
        (broken links, validation failures, drafts, scheduled). Requires
        content.view.
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: The analytics snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsAnalytics"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/analytics/posts/{slug}:
    get:
      operationId: getCmsPostAnalytics
      tags: [analytics]
      summary: Per-post view totals for the CMS editor
      description: >-
        View totals for a single post identified by its public slug: all-time,
        last 7 days and last 30 days. Counts off the immutable `slug` column on
        page views, so totals survive renames. Returns zeros for a slug that has
        never been viewed. Requires content.view.
      parameters:
        - name: slug
          in: path
          required: true
          description: The post's public slug.
          schema:
            type: string
            minLength: 1
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: The post's view totals.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostAnalytics"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /search:
    get:
      operationId: searchPosts
      tags: [search]
      summary: Search posts
      description: Full-text-ish search across post titles, excerpts and content.
      parameters:
        - name: q
          in: query
          required: true
          description: Search query
          schema:
            type: string
            minLength: 1
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: A paginated list of matching posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostListResponse"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserEnvelope"
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        "302":
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        "302":
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "302":
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileTokenExchangeRequest"
      responses:
        "200":
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileTokenExchangeSuccess"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
      responses:
        "200":
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"

  /cms/me:
    get:
      tags: [cms]
      operationId: getCmsMe
      summary: Get the current CMS user with role and effective permissions
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: The current CMS user, role and permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsMe"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/users:
    get:
      tags: [cms]
      operationId: listCmsUsers
      summary: List all CMS users and their roles (requires user management)
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: A list of CMS users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CmsUser"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/users/{userId}/role:
    patch:
      tags: [cms]
      operationId: updateCmsUserRole
      summary: Change a CMS user's role (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          description: The user id whose role is being changed.
          schema:
            type: string
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRoleRequest"
      responses:
        "200":
          description: The updated CMS user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsUser"
        "400":
          description: Invalid role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: User not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/audit-logs:
    get:
      tags: [cms]
      operationId: listCmsAuditLogs
      summary: List the audit trail of privileged CMS actions (requires audit.view)
      description: >-
        Paginated, newest-first activity feed. Optionally filtered by action,
        entity, actor, and a created-at date range.
      parameters:
        - name: action
          in: query
          required: false
          description: >-
            Filter to a single action, e.g. "media.metadata.update" to show only
            image-description edits.
          schema:
            type: string
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: entityType
          in: query
          required: false
          description: Filter by entity type, e.g. "page" or "user".
          schema:
            type: string
        - name: entityId
          in: query
          required: false
          description: Filter by the affected entity's id.
          schema:
            type: string
        - name: actorId
          in: query
          required: false
          description: Filter by the acting user's id.
          schema:
            type: string
        - name: from
          in: query
          required: false
          description: Only entries created at or after this ISO-8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: Only entries created at or before this ISO-8601 timestamp.
          schema:
            type: string
            format: date-time
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: A paginated list of audit log entries (newest first).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/media:
    get:
      tags: [cms]
      operationId: listCmsMedia
      summary: >-
        Browse the media library of existing CDN images, with usage counts,
        referencing pages and alt-text accessibility validation (requires
        media.manage)
      parameters:
        - name: q
          in: query
          required: false
          description: Case-insensitive search across image URL, alt, caption and title.
          schema:
            type: string
        - name: onlyIssues
          in: query
          required: false
          description: When true, only return images whose alt text is missing or poor.
          schema:
            type: boolean
            default: false
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: A paginated list of media items (most-used first).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/media/suggest-alt:
    post:
      tags: [cms]
      operationId: suggestCmsMediaAlt
      summary: >-
        Suggest an accessible alt-text description for an image using an AI
        vision model (requires media.manage). The suggestion is returned for an
        editor to review and edit — it is never saved automatically.
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestMediaAltInput"
      responses:
        "200":
          description: An AI-generated alt-text suggestion for the image.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestMediaAltResponse"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "502":
          description: The AI vision model could not produce a suggestion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/media/suggest-alt-batch:
    post:
      tags: [cms]
      operationId: suggestCmsMediaAltBatch
      summary: >-
        Suggest accessible alt-text descriptions for many images in one pass
        using an AI vision model (requires media.manage). Each suggestion is
        returned for an editor to review and approve individually — nothing is
        saved automatically. Per-image failures are reported inline so a single
        bad image never fails the whole batch.
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestMediaAltBatchInput"
      responses:
        "200":
          description: One alt-text suggestion result per requested image.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestMediaAltBatchResponse"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/media/alt:
    patch:
      tags: [cms]
      operationId: updateCmsMediaAlt
      summary: >-
        Save reviewed alt text for a media item, updating every usage of the
        image (keyed by CDN URL) across all pages (requires media.manage).
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMediaAltInput"
      responses:
        "200":
          description: The updated alt text and how many usages were changed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMediaAltResponse"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
