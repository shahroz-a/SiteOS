        report:
          $ref: '#/components/schemas/PayloadMigrationReport'

    MediaAltStatus:
      type: string
      description: Accessibility classification of an image's alt text. `ok` = descriptive alt present; `missing` = no alt text at all; `poor` = alt text is too short, a generic placeholder, or just a filename.
      enum:
        - ok
        - missing
        - poor

    SuggestMediaAltInput:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: The CDN URL of the image to describe.

    SuggestMediaAltResponse:
      type: object
      required:
        - suggestion
      properties:
        suggestion:
          type: string
          description: An AI-generated alt-text description for the editor to review.

    SuggestMediaAltBatchInput:
      type: object
      required:
        - urls
      properties:
        urls:
          type: array
          minItems: 1
          maxItems: 50
          description: The CDN URLs of the images to describe in one pass.
          items:
            type: string
            format: uri

    SuggestMediaAltBatchResult:
      type: object
      description: The suggestion outcome for a single image in a batch request.
      required:
        - url
        - suggestion
        - error
      properties:
        url:
          type: string
          format: uri
          description: The CDN URL this result is for.
        suggestion:
          type:
            - string
            - 'null'
          description: The AI-generated alt-text description, or null if it failed.
        error:
          type:
            - string
            - 'null'
          description: A human-readable failure reason, or null on success.

    SuggestMediaAltBatchResponse:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          description: One result per requested URL, in the same order.
          items:
            $ref: '#/components/schemas/SuggestMediaAltBatchResult'

    UpdateMediaAltInput:
      type: object
      required:
        - url
        - alt
      properties:
        url:
          type: string
          format: uri
          description: The CDN URL identifying the media item to update.
        alt:
          type: string
          maxLength: 500
          description: The reviewed alt text to apply to every usage of this image.

    UpdateMediaAltResponse:
      type: object
      required:
        - url
        - alt
        - updatedUsages
      properties:
        url:
          type: string
        alt:
          type: string
        updatedUsages:
          type: integer
          description: How many image usages (rows) were updated across all pages.

    UpdateMediaMetadataInput:
      type: object
      description: >-
        Reviewed metadata for a media item. At least one of title/caption/credit
        must be present; an explicit null or empty string clears that field. Only
        the provided fields are changed.
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: The CDN URL identifying the media item to update.
        title:
          type:
            - string
            - 'null'
          maxLength: 500
          description: The reviewed title to apply to every usage of this image.
        caption:
          type:
            - string
            - 'null'
          maxLength: 2000
          description: The reviewed caption to apply to every usage of this image.
        credit:
          type:
            - string
            - 'null'
          maxLength: 500
          description: The reviewed credit/attribution to apply to every usage of this image.

    UpdateMediaMetadataResponse:
      type: object
      required:
        - url
        - title
        - caption
        - credit
        - updatedUsages
        - changedFields
      properties:
        url:
          type: string
        title:
          type:
            - string
            - 'null'
        caption:
          type:
            - string
            - 'null'
        credit:
          type:
            - string
            - 'null'
        updatedUsages:
          type: integer
          description: How many image usages (rows) were updated across all pages.
        changedFields:
          type: array
          description: Which metadata fields actually changed value (audited).
          items:
            type: string

    MediaUsagePage:
      type: object
      description: A page that references a media item, with the alt text used there.
      required:
        - id
        - slug
        - title
        - status
        - pathname
        - alt
        - altStatus
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        status:
          $ref: '#/components/schemas/PageStatus'
        pathname:
          type: string
        alt:
          type:
            - string
            - 'null'
        altStatus:
          $ref: '#/components/schemas/MediaAltStatus'

    MediaItem:
      type: object
      description: A unique CDN image (keyed by URL) aggregated across every page that references it. The library never re-uploads binaries; it reuses the existing Headout CDN URL.
      required:
        - url
        - originalUrl
        - alt
        - title
        - caption
        - credit
        - width
        - height
        - mimeType
        - role
        - usageCount
        - pageCount
        - altStatus
        - altIssues
        - pages
      properties:
        url:
          type: string
          description: The canonical CDN URL — the stable identifier for the media item.
        originalUrl:
          type:
            - string
            - 'null'
        alt:
          type:
            - string
            - 'null'
          description: The most descriptive (longest) alt text found across usages.
        title:
          type:
            - string
            - 'null'
        caption:
          type:
            - string
            - 'null'
        credit:
          type:
            - string
            - 'null'
        width:
          type:
            - integer
            - 'null'
        height:
          type:
            - integer
            - 'null'
        mimeType:
          type:
            - string
            - 'null'
        role:
          type:
            - string
            - 'null'
        usageCount:
          type: integer
          description: Total number of times this image is referenced across all pages.
        pageCount:
          type: integer
          description: Number of distinct pages that reference this image.
        altStatus:
          $ref: '#/components/schemas/MediaAltStatus'
        altIssues:
          type: array
          description: Human-readable accessibility warnings for this image's alt text.
          items:
            type: string
        pages:
          type: array
          description: Pages referencing this image (capped). Empty in list rows that omit usage detail.
          items:
            $ref: '#/components/schemas/MediaUsagePage'

    MediaSummary:
      type: object
      description: Aggregate counts across the full (search-filtered) media set.
      required:
        - totalImages
        - withAltIssues
      properties:
        totalImages:
          type: integer
        withAltIssues:
          type: integer

    MediaListResponse:
      type: object
      required:
        - items
        - pagination
        - summary
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MediaItem'
        pagination:
          $ref: '#/components/schemas/Pagination'
        summary:
          $ref: '#/components/schemas/MediaSummary'

    UploadedImage:
      type: object
      description: An image previously uploaded to object storage via the presigned-URL flow, reusable in a block without re-uploading.
      required:
        - url
        - name
        - size
        - contentType
        - updatedAt
      properties:
        url:
          type: string
          description: App-relative serving URL (`/api/storage/objects/...`) — the value to store as a block image `src`.
        name:
          type: string
          description: The object entity path within storage (e.g. `uploads/<uuid>`); used as a stable key and fallback label.
        size:
          type:
            - integer
            - 'null'
          description: File size in bytes, when known.
        contentType:
          type:
            - string
            - 'null'
          description: The stored MIME type, when known.
        updatedAt:
          type:
            - string
            - 'null'
          description: ISO timestamp the object was last updated/created, when known.

    UploadedImageListResponse:
      type: object
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UploadedImage'
        pagination:
          $ref: '#/components/schemas/Pagination'

    HeldBackValidationIssue:
      type: object
      required:
        - field
        - source
        - parsed
        - severity
        - message
      properties:
        field:
          type: string
        source:
          type: integer
        parsed:
          type: integer
        severity:
          type: string
          enum:
            - warn
            - fail
        message:
          type: string

    HeldBackArticle:
      type: object
      required:
        - id
        - slug
        - title
        - url
        - crawledAt
        - validationStatus
        - validationScore
        - issues
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type:
            - string
            - 'null'
        url:
          type:
            - string
            - 'null'
        crawledAt:
          type:
            - string
            - 'null'
          format: date-time
        validationStatus:
          type:
            - string
            - 'null'
          enum:
            - pass
            - warn
            - fail
            - null
          description: The verdict re-scored through the current validator. Null when the article has no stored validation row yet.
        validationScore:
          type:
            - integer
            - 'null'
        issues:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/HeldBackValidationIssue'

    HeldBackArticleListResponse:
      type: object
      required: [total, articles, pagination]
      properties:
        total:
          type: integer
          description: >-
            Total number of held-back articles matching the active filters
            (across all pages), re-scored live.
        articles:
          type: array
          items:
            $ref: '#/components/schemas/HeldBackArticle'
        pagination:
          $ref: '#/components/schemas/Pagination'

    HeldBackArticleSource:
      type: object
      required:
        - id
        - slug
        - title
        - url
        - sourceHtml
        - sourceKind
        - componentTree
        - richText
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type:
            - string
            - 'null'
        url:
          type:
            - string
            - 'null'
        sourceHtml:
          type:
            - string
            - 'null'
          description: The faithful source body — cleaned article HTML, or the raw original HTML when no cleaned body exists. Null when the article has no stored HTML at all.
        sourceKind:
          type:
            - string
            - 'null'
          enum:
            - cleaned
            - original
            - null
          description: Which column sourceHtml was taken from. Null when no source HTML exists.
        componentTree:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: 'null'
          description: The parsed Payload-style block tree the importer extracted.
        richText:
          type:
            - object
            - 'null'
          additionalProperties: true
          description: The parsed Lexical rich-text tree the importer extracted.

    CmsDashboardCrawl:
      type: object
      description: Crawl / ingestion pipeline state, derived from the crawl queue.
      required:
        - pending
        - inProgress
        - completed
        - failed
        - skipped
        - total
        - lastCompletedAt
      properties:
        pending:
          type: integer
        inProgress:
          type: integer
        completed:
          type: integer
        failed:
          type: integer
        skipped:
          type: integer
        total:
          type: integer
        lastCompletedAt:
          type:
            - string
            - 'null'
          format: date-time

    CmsDashboardDatabase:
      type: object
      description: Live database health probe.
      required:
        - status
        - latencyMs
      properties:
        status:
          type: string
          enum:
            - healthy
            - degraded
            - down
        latencyMs:
          type: integer

    CmsDashboardStorage:
      type: object
      description: Postgres database size on disk.
      required:
        - bytes
      properties:
        bytes:
          type: integer
          description: Total database size in bytes (pg_database_size).

    CmsDashboardStats:
      type: object
      required:
        - totalBlogs
        - published
        - drafts
        - scheduled
        - archived
        - authors
        - categories
        - tags
        - missingSeo
        - brokenLinks
        - validationErrors
        - publishingQueue
        - crawl
        - database
        - storage
      properties:
        totalBlogs:
          type: integer
        published:
          type: integer
        drafts:
          type: integer
        scheduled:
          type: integer
          description: Published articles with a future publish date.
        archived:
          type: integer
        authors:
          type: integer
        categories:
          type: integer
        tags:
          type: integer
        missingSeo:
          type: integer
          description: Articles without a meta title and meta description.
        brokenLinks:
          type: integer
          description: Internal links that do not resolve to a known page.
        validationErrors:
          type: integer
          description: Articles whose latest validation report failed.
        publishingQueue:
          type: integer
          description: Crawl-queue items still pending or in progress.
        crawl:
          $ref: '#/components/schemas/CmsDashboardCrawl'
        database:
          $ref: '#/components/schemas/CmsDashboardDatabase'
        storage:
          $ref: '#/components/schemas/CmsDashboardStorage'

    CmsDashboardPost:
      type: object
      required:
        - id
        - slug
        - title
        - status
        - updatedAt
        - publishedAt
        - authorName
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        status:
          type: string
          enum:
            - draft
            - published
            - archived
        updatedAt:
          type: string
          format: date-time
        publishedAt:
          type:
            - string
            - 'null'
          format: date-time
        authorName:
          type:
            - string
            - 'null'

    CmsDashboardActivity:
      type: object
      required:
        - id
        - action
        - actorEmail
        - actorRole
        - entityType
        - entityId
        - createdAt
      properties:
        id:
          type: string
        action:
          type: string
        actorEmail:
          type:
            - string
            - 'null'
        actorRole:
          type:
            - string
            - 'null'
        entityType:
          type:
            - string
            - 'null'
        entityId:
          type:
            - string
            - 'null'
        createdAt:
          type: string
          format: date-time

    CmsDashboard:
      type: object
      required:
        - stats
        - recentlyEdited
        - recentlyPublished
        - activity
      properties:
        stats:
          $ref: '#/components/schemas/CmsDashboardStats'
        recentlyEdited:
          type: array
          items:
            $ref: '#/components/schemas/CmsDashboardPost'
        recentlyPublished:
          type: array
          items:
            $ref: '#/components/schemas/CmsDashboardPost'
        activity:
          type: array
          items:
            $ref: '#/components/schemas/CmsDashboardActivity'

    ResolveHeldBackArticleRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [publish, dismiss]
          description: >-
            "publish" sets pages.status to published (releases the article to
            the public read API); "dismiss" sets it to archived (removes it from
            the review queue without making it public).

    ResolveHeldBackArticleResponse:
      type: object
      required: [id, slug, status]
      properties:
        id:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [published, archived]
          description: The article's status after the decision was applied.

    ApproveHeldBackArticleResponse:
      type: object
      required: [id, slug, approved, status, validationStatus, validationScore, issues]
      properties:
        id:
          type: string
        slug:
          type: string
        approved:
          type: boolean
          description: >-
            True when the article re-validated cleanly and was published; false
            when it still fails (or has no validation data) and was left a draft.
        status:
          type: string
          enum: [published, draft]
          description: The article's status after the approval attempt.
        validationStatus:
          type:
            - string
            - 'null'
          enum: [pass, warn, fail, null]
          description: >-
            The live content-fidelity verdict computed server-side at approval
            time, or null when the article has no validation data to re-score.
        validationScore:
          type:
            - integer
            - 'null'
          description: The content-fidelity score (0-100), or null when there is no data.
        issues:
          type: array
          items:
            $ref: '#/components/schemas/HeldBackValidationIssue'

    ReparseHeldBackArticleRequest:
      type: object
      properties:
        html:
          type: string
          description: >-
            Hand-edited article body HTML to parse instead of the stored source.
            When omitted, the stored source HTML (cleaned, falling back to the
            raw original) is re-parsed as-is.

    ReparseHeldBackArticleResponse:
      type: object
      required:
        - id
        - slug
        - mode
        - componentTree
        - richText
        - validationStatus
        - validationScore
        - issues
      properties:
        id:
          type: string
        slug:
          type: string
        mode:
          type: string
          enum: [reparse, edit]
          description: >-
            "reparse" when the stored source HTML was re-parsed; "edit" when
            hand-edited HTML was supplied in the request body.
        componentTree:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: 'null'
          description: The freshly parsed Payload-style block tree now persisted on the page.
        richText:
          type:
            - object
            - 'null'
          additionalProperties: true
          description: The freshly parsed Lexical rich-text tree now persisted on the page.
        validationStatus:
          type: string
          enum: [pass, warn, fail]
          description: The content-fidelity verdict of the re-parsed body.
        validationScore:
          type: integer
          description: The content-fidelity score (0-100) of the re-parsed body.
        issues:
          type: array
          items:
            $ref: '#/components/schemas/HeldBackValidationIssue'

    PageVersionSummary:
