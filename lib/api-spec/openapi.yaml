  /cms/posts/{id}/validation:
    get:
      tags: [cms]
      operationId: getCmsPostValidation
      summary: SEO + publish validation report for an article (requires content.view)
      description: >-
        Runs the SEO + publish validation engine over the article's current
        persisted state and returns per-check results, an overall score and the
        subset of blocking (critical) failures that would prevent publishing.
        Includes DB-derived duplicate detection (title / meta title / meta
        description). Read-only — does not persist a report.
      parameters:
        - $ref: "#/components/parameters/CmsIdParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: The validation report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeoValidationResult"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          $ref: "#/components/responses/CmsNotFound"

  /cms/posts/{id}/ai/suggest:
    post:
      tags: [cms]
      operationId: suggestCmsAi
      summary: AI writing & SEO suggestions for an article (requires content.edit)
      description: >-
        Runs the in-editor AI assistant over the article and returns structured,
        suggest-only suggestions of the requested kind (SEO, metadata,
        summaries, social captions, FAQ generation, related articles,
        readability notes, duplicate detection, internal-link ideas). Strictly
        advisory — it NEVER writes to content; the editor accepts or rejects each
        suggestion. Related/duplicate/internal-link kinds are grounded against
        published sibling articles so paths can't be hallucinated.
      parameters:
        - $ref: "#/components/parameters/CmsIdParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSuggestRequest"
      responses:
        "200":
          description: The generated suggestions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSuggestResponse"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          $ref: "#/components/responses/CmsNotFound"

  /cms/posts/{id}/ai/decision:
    post:
      tags: [cms]
      operationId: recordCmsAiDecision
      summary: Record an editor's accept/reject decision on an AI suggestion (requires content.edit)
      description: >-
        Logs what an editor did with a single AI suggestion (accepted vs
        rejected), along with the suggestion kind and — for field suggestions —
        the target field. Stored in the append-only audit trail so the team can
        see which kinds of suggestions are useful and audit AI-assisted edits.
        Best-effort: a logging failure never blocks the editor.
      parameters:
        - $ref: "#/components/parameters/CmsIdParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiDecisionRequest"
      responses:
        "204":
          description: The decision was recorded.
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          $ref: "#/components/responses/CmsNotFound"

  /cms/ai/decisions/report:
    get:
      tags: [cms]
      operationId: getCmsAiDecisionReport
      summary: Usefulness report of AI suggestion accept/reject decisions per kind (requires content.view)
      description: >-
        Aggregates the recorded accept/reject decisions per suggestion kind so
        the team can see which kinds of AI suggestions editors actually find
        useful (acceptance rate), and improve prompts over time.
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
