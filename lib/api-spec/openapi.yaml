components:
  parameters:
    SlugParam:
      name: slug
      in: path
      required: true
      description: The resource slug (public identifier)
      schema:
        type: string
    PageParam:
      name: page
      in: query
      required: false
      description: 1-based page number
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      required: false
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 12
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
    CmsIdParam:
      name: id
      in: path
      required: true
      description: The internal resource id (UUID). CMS routes address rows by id, not slug.
      schema:
        type: string
        format: uuid

  responses:
    CmsBadRequest:
      description: Invalid request body.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    CmsUnauthorized:
      description: Not authenticated.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    CmsForbidden:
      description: Insufficient permissions.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    CmsNotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    CmsPublishBlocked:
      description: >-
        Publishing was blocked by the validation publish gate — one or more
        critical SEO/content checks failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CmsPublishBlockedError"

  schemas:
    SeoCheck:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        category:
          type: string
          enum: [url, metadata, social, structured, content, media, links]
        severity:
          type: string
          enum: [error, warn, info]
        passed:
          type: boolean
        message:
          type: string
      required:
        - id
        - label
        - category
        - severity
        - passed
        - message

    SeoDuplicateRef:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type: string
      required:
        - id
        - slug
        - title

    SeoDuplicates:
      type: object
      description: DB-derived duplicate refs, or null when the field is unique/empty.
      properties:
        title:
          oneOf:
            - $ref: "#/components/schemas/SeoDuplicateRef"
            - type: "null"
        metaTitle:
          oneOf:
            - $ref: "#/components/schemas/SeoDuplicateRef"
            - type: "null"
        metaDescription:
          oneOf:
            - $ref: "#/components/schemas/SeoDuplicateRef"
            - type: "null"

    SeoValidationResult:
      type: object
      properties:
        checks:
          type: array
          items:
            $ref: "#/components/schemas/SeoCheck"
        score:
          type: integer
        status:
          type: string
          enum: [pass, warn, fail]
        blocking:
          type: array
          items:
            $ref: "#/components/schemas/SeoCheck"
        passedCount:
          type: integer
        totalCount:
          type: integer
        duplicates:
          $ref: "#/components/schemas/SeoDuplicates"
      required:
        - checks
        - score
        - status
        - blocking
        - passedCount
        - totalCount
        - duplicates

    CmsPublishBlockedError:
      type: object
      properties:
        error:
          type: string
        blocking:
          type: array
          items:
            $ref: "#/components/schemas/SeoCheck"
      required:
        - error
        - blocking

    CmsSeoMeta:
      type: object
      properties:
        metaTitle:
          type: ["string", "null"]
        metaDescription:
          type: ["string", "null"]
        canonicalUrl:
          type: ["string", "null"]
        robots:
          type: ["string", "null"]
        focusKeyword:
          type: ["string", "null"]
        keywords:
          type: ["array", "null"]
          items:
            type: string
        ogTitle:
          type: ["string", "null"]
        ogDescription:
          type: ["string", "null"]
        ogImage:
          type: ["string", "null"]
        ogType:
          type: ["string", "null"]
        twitterCard:
          type: ["string", "null"]
        twitterTitle:
          type: ["string", "null"]
        twitterDescription:
          type: ["string", "null"]
        twitterImage:
          type: ["string", "null"]
        needsReview:
          type: boolean
      required:
        - needsReview

    CmsLink:
      type: object
      properties:
        id:
          type: string
          format: uuid
        href:
          type: string
        anchorText:
          type: ["string", "null"]
        rel:
          type: ["string", "null"]
        domain:
          type: ["string", "null"]
        position:
          type: integer
      required:
        - href
        - position

    CmsGallery:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: ["string", "null"]
        layout:
          type: ["string", "null"]
        position:
          type: integer
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageItem"
      required:
        - position
        - images

    CmsPostDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        status:
          $ref: "#/components/schemas/PageStatus"
        pageType:
          type: string
        title:
          type: string
        subtitle:
          type: ["string", "null"]
        excerpt:
          type: ["string", "null"]
        canonicalUrl:
          type: string
        originalUrl:
          type: ["string", "null"]
          description: The page's original (imported/first) URL — never auto-changed.
        pathname:
          type: string
        parentPath:
          type: ["string", "null"]
        featuredImageUrl:
          type: ["string", "null"]
        featuredImageAlt:
          type: ["string", "null"]
        readingTimeMinutes:
          type: ["integer", "null"]
        wordCount:
          type: ["integer", "null"]
        language:
          type: string
        publishedAt:
          type: ["string", "null"]
          format: date-time
        scheduledFor:
          type: ["string", "null"]
          format: date-time
        modifiedAt:
          type: ["string", "null"]
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time
        contentHtml:
          type: ["string", "null"]
        richText:
          type: ["object", "null"]
          additionalProperties: true
        componentTree:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: "null"
        author:
          oneOf:
            - $ref: "#/components/schemas/AuthorSummary"
            - type: "null"
        primaryCategory:
          oneOf:
            - $ref: "#/components/schemas/CategorySummary"
            - type: "null"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategorySummary"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagSummary"
        breadcrumbs:
          type: array
          items:
            $ref: "#/components/schemas/Breadcrumb"
        faq:
          type: array
          items:
            $ref: "#/components/schemas/FaqItem"
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageItem"
        galleries:
          type: array
          items:
            $ref: "#/components/schemas/CmsGallery"
        seo:
          oneOf:
            - $ref: "#/components/schemas/CmsSeoMeta"
            - type: "null"
        jsonld:
          type: array
          items:
            $ref: "#/components/schemas/JsonLdItem"
        internalLinks:
          type: array
          items:
            $ref: "#/components/schemas/CmsLink"
        externalLinks:
          type: array
          items:
            $ref: "#/components/schemas/CmsLink"
        latestVersion:
          type: ["integer", "null"]
        redirects:
          type: array
          description: Redirect rows whose target is this page's current pathname.
          items:
            $ref: "#/components/schemas/CmsRedirect"
      required:
        - id
        - slug
        - status
        - pageType
        - title
        - canonicalUrl
        - pathname
        - language
        - categories
        - tags
        - breadcrumbs
        - faq
        - images
        - galleries
        - jsonld
        - internalLinks
        - externalLinks
        - redirects

    PageStatus:
      type: string
      enum:
        - draft
        - review
        - scheduled
        - published
        - archived

    CmsImageInput:
      type: object
      properties:
        url:
          type: string
        originalUrl:
          type: ["string", "null"]
        alt:
          type: ["string", "null"]
        title:
          type: ["string", "null"]
        caption:
          type: ["string", "null"]
        credit:
          type: ["string", "null"]
        width:
          type: ["integer", "null"]
        height:
          type: ["integer", "null"]
        mimeType:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
        position:
          type: integer
          default: 0
      required:
        - url

    CmsGalleryInput:
      type: object
      properties:
        title:
          type: ["string", "null"]
        layout:
          type: ["string", "null"]
        position:
          type: integer
          default: 0
        images:
          type: array
          items:
            $ref: "#/components/schemas/CmsImageInput"
      required:
        - images

    CmsFaqInput:
      type: object
      properties:
        question:
          type: string
        answer:
          type: string
        position:
          type: integer
          default: 0
      required:
        - question
        - answer

    CmsBreadcrumbInput:
      type: object
      properties:
        label:
          type: string
        url:
          type: ["string", "null"]
        position:
          type: integer
          default: 0
      required:
        - label

    CmsJsonLdInput:
      type: object
      properties:
        type:
          type: ["string", "null"]
        data:
          type: object
          additionalProperties: true
      required:
        - data

    CmsLinkInput:
      type: object
      properties:
        href:
          type: string
        anchorText:
          type: ["string", "null"]
        rel:
          type: ["string", "null"]
        domain:
          type: ["string", "null"]
        position:
          type: integer
          default: 0
      required:
        - href

    CmsSeoInput:
      type: object
      properties:
        metaTitle:
          type: ["string", "null"]
        metaDescription:
          type: ["string", "null"]
        canonicalUrl:
          type: ["string", "null"]
        robots:
          type: ["string", "null"]
        focusKeyword:
          type: ["string", "null"]
        keywords:
          type: ["array", "null"]
          items:
            type: string
        ogTitle:
          type: ["string", "null"]
        ogDescription:
          type: ["string", "null"]
        ogImage:
          type: ["string", "null"]
        ogType:
          type: ["string", "null"]
        twitterCard:
          type: ["string", "null"]
        twitterTitle:
          type: ["string", "null"]
        twitterDescription:
          type: ["string", "null"]
        twitterImage:
          type: ["string", "null"]
        needsReview:
          type: boolean

    CmsPostInput:
      type: object
      description: >-
        Full create/replace payload for an article. On update (PUT) all nested
        collections are rewritten wholesale to match the payload.
      properties:
        title:
          type: string
          minLength: 1
        slug:
          type: string
          description: Optional; derived from the title when omitted on create.
        subtitle:
          type: ["string", "null"]
        excerpt:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/PageStatus"
        language:
          type: string
          default: en
        canonicalUrl:
          type: ["string", "null"]
        pathname:
          type: ["string", "null"]
        parentPath:
          type: ["string", "null"]
        authorId:
          type: ["string", "null"]
          format: uuid
        primaryCategoryId:
          type: ["string", "null"]
          format: uuid
        categoryIds:
          type: array
          items:
            type: string
            format: uuid
        tagIds:
          type: array
          items:
            type: string
            format: uuid
        featuredImageUrl:
          type: ["string", "null"]
        featuredImageAlt:
          type: ["string", "null"]
        contentHtml:
          type: ["string", "null"]
        richText:
          type: ["object", "null"]
          additionalProperties: true
        componentTree:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: "null"
        readingTimeMinutes:
          type: ["integer", "null"]
        wordCount:
          type: ["integer", "null"]
        publishedAt:
          type: ["string", "null"]
          format: date-time
        scheduledFor:
          type: ["string", "null"]
          format: date-time
        seo:
          oneOf:
            - $ref: "#/components/schemas/CmsSeoInput"
            - type: "null"
        faq:
          type: array
          items:
            $ref: "#/components/schemas/CmsFaqInput"
        breadcrumbs:
          type: array
          items:
            $ref: "#/components/schemas/CmsBreadcrumbInput"
        jsonld:
          type: array
          items:
            $ref: "#/components/schemas/CmsJsonLdInput"
        images:
          type: array
          items:
            $ref: "#/components/schemas/CmsImageInput"
        galleries:
          type: array
          items:
            $ref: "#/components/schemas/CmsGalleryInput"
        internalLinks:
          type: array
          items:
            $ref: "#/components/schemas/CmsLinkInput"
        externalLinks:
          type: array
          items:
            $ref: "#/components/schemas/CmsLinkInput"
        changeSummary:
          type: string
          description: Optional human note stored on the version snapshot.
      required:
        - title

    CmsScaffoldInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        slug:
          type: string
      required:
        - title

    CmsDuplicateInput:
      type: object
      properties:
        title:
          type: ["string", "null"]
          description: Title for the copy; defaults to "<original title> (Copy)".
        slug:
          type: ["string", "null"]
          description: Slug for the copy; auto-generated and uniquified when omitted.

    AiSuggestRequest:
      type: object
      properties:
        kind:
          type: string
          description: Which kind of AI suggestion to generate.
          enum:
            - seo
            - metadata
            - summary
            - social
            - faq
            - related
            - readability
            - duplicate
            - internal-links
      required:
        - kind

    AiSuggestion:
      type: object
      description: >-
        A single suggest-only suggestion. `apply` tells the editor how to apply
        it if accepted: `field` writes `value` into the editor field named by
        `target`; `faq` adds a FAQ entry (`question`/`answer`); `info` is
        advisory/copyable (`value`).
      properties:
        id:
          type: string
        apply:
          type: string
          enum: [field, faq, info]
        label:
          type: string
        detail:
          type: string
        target:
          type: ["string", "null"]
        value:
          type: ["string", "null"]
        question:
          type: ["string", "null"]
        answer:
          type: ["string", "null"]
      required:
        - id
        - apply
        - label
        - detail
        - target
        - value
        - question
        - answer

    AiSuggestResponse:
      type: object
      properties:
        kind:
          type: string
        model:
          type: string
        summary:
          type: string
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/AiSuggestion"
      required:
        - kind
        - model
        - summary
        - suggestions

    AiDecisionRequest:
      type: object
      description: >-
        An editor's accept/reject decision on a single AI suggestion.
      properties:
        kind:
          type: string
          description: The suggestion kind the decision applies to.
          enum:
            - seo
            - metadata
            - summary
            - social
            - faq
            - related
            - readability
            - duplicate
            - internal-links
        decision:
          type: string
          description: Whether the editor accepted (applied) or rejected (dismissed) it.
          enum: [accepted, rejected]
        apply:
          type: string
          description: How the suggestion would be applied (mirrors AiSuggestion.apply).
          enum: [field, faq, info]
        target:
          type: ["string", "null"]
          description: The editor field a `field` suggestion targets, when applicable.
        suggestionId:
          type: ["string", "null"]
          description: The id of the suggestion the editor acted on.
        label:
          type: ["string", "null"]
          description: A short human label of the suggestion, for the audit trail.
      required:
        - kind
        - decision
        - apply

    AiDecisionKindStat:
      type: object
      description: Accept/reject tallies for a single suggestion kind.
      properties:
        kind:
          type: string
        accepted:
          type: integer
        rejected:
          type: integer
        total:
          type: integer
        acceptanceRate:
          type: number
          description: accepted / total, in [0, 1]; 0 when there are no decisions.
      required:
        - kind
        - accepted
        - rejected
        - total
        - acceptanceRate

    AiDecisionReport:
      type: object
      description: >-
        Usefulness report of recorded AI-suggestion decisions, per kind plus an
        overall total.
      properties:
        kinds:
          type: array
          items:
            $ref: "#/components/schemas/AiDecisionKindStat"
        totals:
          $ref: "#/components/schemas/AiDecisionKindStat"
      required:
        - kinds
        - totals

    CmsAuthorInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        originalUrl:
