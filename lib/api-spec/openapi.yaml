openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: posts
    description: Blog post read operations
  - name: categories
    description: Category read operations
  - name: authors
    description: Author read operations
  - name: search
    description: Search operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: cms
    description: Internal CMS (Blog Studio) endpoints — authenticated, role-gated.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List posts
      description: List and paginate published posts, optionally filtered by category, author or tag slug.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: category
          in: query
          required: false
          description: Filter by category slug
          schema:
            type: string
        - name: author
          in: query
          required: false
          description: Filter by author slug
          schema:
            type: string
        - name: tag
          in: query
          required: false
          description: >-
            Filter by tag slug. Accepts a single slug, or a comma-separated list
            of slugs to match posts carrying ANY of them (OR semantics).
          schema:
            type: string
      responses:
        "200":
          description: A paginated list of posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostListResponse"

  /posts/{slug}:
    get:
      operationId: getPostBySlug
      tags: [posts]
      summary: Get a post by slug
      description: Fetch a single post and its full content by slug. Slugs (not internal UUIDs) are the public identifier.
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: The requested post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostDetail"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories
      description: List all categories.
      responses:
        "200":
          description: A list of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /categories/{slug}:
    get:
      operationId: getCategoryBySlug
      tags: [categories]
      summary: Get a category by slug
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: The requested category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /authors:
    get:
      operationId: listAuthors
      tags: [authors]
      summary: List authors
      description: List all authors.
      responses:
        "200":
          description: A list of authors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Author"

  /authors/{slug}:
    get:
      operationId: getAuthorBySlug
      tags: [authors]
      summary: Get an author by slug
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: The requested author
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "404":
          description: Author not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /tags:
    get:
      operationId: listTags
      tags: [tags]
      summary: List tags
      description: List all tags, each with a count of published posts.
      responses:
        "200":
          description: A list of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"

  /search:
    get:
      operationId: searchPosts
      tags: [search]
      summary: Search posts
      description: Full-text-ish search across post titles, excerpts and content.
      parameters:
        - name: q
          in: query
          required: true
          description: Search query
          schema:
            type: string
            minLength: 1
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: A paginated list of matching posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostListResponse"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserEnvelope"
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        "302":
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        "302":
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "302":
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileTokenExchangeRequest"
      responses:
        "200":
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileTokenExchangeSuccess"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
      responses:
        "200":
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"

  /cms/me:
    get:
      tags: [cms]
      operationId: getCmsMe
      summary: Get the current CMS user with role and effective permissions
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: The current CMS user, role and permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsMe"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/users:
    get:
      tags: [cms]
      operationId: listCmsUsers
      summary: List all CMS users and their roles (requires user management)
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: A list of CMS users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CmsUser"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/users/{userId}/role:
    patch:
      tags: [cms]
      operationId: updateCmsUserRole
      summary: Change a CMS user's role (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          description: The user id whose role is being changed.
          schema:
            type: string
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRoleRequest"
      responses:
        "200":
          description: The updated CMS user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsUser"
        "400":
          description: Invalid role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: User not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/audit-logs:
    get:
      tags: [cms]
      operationId: listCmsAuditLogs
      summary: List the audit trail of privileged CMS actions (requires audit.view)
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: A paginated list of audit log entries (newest first).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/media:
    get:
      tags: [cms]
      operationId: listCmsMedia
      summary: >-
        Browse the media library of existing CDN images, with usage counts,
        referencing pages and alt-text accessibility validation (requires
        media.manage)
      parameters:
        - name: q
          in: query
          required: false
          description: Case-insensitive search across image URL, alt, caption and title.
          schema:
            type: string
        - name: onlyIssues
          in: query
          required: false
          description: When true, only return images whose alt text is missing or poor.
          schema:
            type: boolean
            default: false
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: A paginated list of media items (most-used first).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/held-back-articles:
    get:
      tags: [cms]
      operationId: listCmsHeldBackArticles
      summary: List articles held back from the public API for editor review (requires review.approve)
      description: >-
        The review queue of articles kept out of the public read API because
        content-fidelity validation failed (pages.status="draft"). Each entry's
        verdict is re-scored at request time through the current validator, so
        the displayed status/score/issues always reflect the live rules — never
        a stale verdict from an older validator.
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: The list of held-back articles, newest first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeldBackArticleListResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /cms/posts:
    get:
      tags: [cms]
      operationId: listCmsPost
      summary: List/search articles of any status (requires content.view)
      description: >-
        Paginated list of articles across every status (draft, published,
        archived) for the CMS content list and the internal-linking assistant.
        Optional full-text `q` matches title/slug; `status` narrows to one state.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: q
          in: query
          required: false
          description: Case-insensitive search over title and slug.
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Restrict to a single page status.
          schema:
            $ref: "#/components/schemas/PageStatus"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: A paginated list of articles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsPostListResponse"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
    post:
      tags: [cms]
      operationId: createCmsPost
      summary: Create an article (page) with all nested content (requires content.create)
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmsPostInput"
      responses:
        "201":
          description: The created article.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsPostDetail"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/posts/scaffold:
    post:
      tags: [cms]
      operationId: scaffoldCmsPost
      summary: Create a blank draft article scaffold (requires content.create)
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmsScaffoldInput"
      responses:
        "201":
          description: The created blank draft.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsPostDetail"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/posts/{id}:
    get:
      tags: [cms]
      operationId: getCmsPost
      summary: Get a single article by internal id, any status (requires content.view)
      parameters:
        - $ref: "#/components/parameters/CmsIdParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: The article.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsPostDetail"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          $ref: "#/components/responses/CmsNotFound"
    put:
      tags: [cms]
      operationId: updateCmsPost
      summary: Replace an article and all its nested content (requires content.edit)
      parameters:
        - $ref: "#/components/parameters/CmsIdParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmsPostInput"
      responses:
        "200":
          description: The updated article.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsPostDetail"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          $ref: "#/components/responses/CmsNotFound"
    delete:
      tags: [cms]
      operationId: deleteCmsPost
      summary: Delete an article and all its nested content (requires content.delete)
      parameters:
        - $ref: "#/components/parameters/CmsIdParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Deletion result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsDeleteResult"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          $ref: "#/components/responses/CmsNotFound"

  /cms/posts/{id}/duplicate:
    post:
      tags: [cms]
      operationId: duplicateCmsPost
      summary: Duplicate an article as a new draft with SEO flagged for review (requires content.create)
      parameters:
        - $ref: "#/components/parameters/CmsIdParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmsDuplicateInput"
      responses:
        "201":
          description: The duplicated draft.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsPostDetail"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          $ref: "#/components/responses/CmsNotFound"

  /cms/authors:
    post:
      tags: [cms]
      operationId: createCmsAuthor
      summary: Create an author (requires taxonomy.manage)
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmsAuthorInput"
      responses:
        "201":
          description: The created author.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/authors/{id}:
    put:
      tags: [cms]
      operationId: updateCmsAuthor
      summary: Update an author (requires taxonomy.manage)
      parameters:
        - $ref: "#/components/parameters/CmsIdParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmsAuthorInput"
      responses:
        "200":
          description: The updated author.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          $ref: "#/components/responses/CmsNotFound"
    delete:
      tags: [cms]
      operationId: deleteCmsAuthor
      summary: Delete an author (requires taxonomy.manage)
      parameters:
        - $ref: "#/components/parameters/CmsIdParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Deletion result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsDeleteResult"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          $ref: "#/components/responses/CmsNotFound"

  /cms/categories:
    post:
      tags: [cms]
      operationId: createCmsCategory
      summary: Create a category (requires taxonomy.manage)
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmsCategoryInput"
      responses:
        "201":
          description: The created category.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/categories/{id}:
    put:
      tags: [cms]
      operationId: updateCmsCategory
      summary: Update a category (requires taxonomy.manage)
      parameters:
        - $ref: "#/components/parameters/CmsIdParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmsCategoryInput"
      responses:
        "200":
          description: The updated category.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          $ref: "#/components/responses/CmsNotFound"
    delete:
      tags: [cms]
      operationId: deleteCmsCategory
      summary: Delete a category (requires taxonomy.manage)
      parameters:
        - $ref: "#/components/parameters/CmsIdParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Deletion result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsDeleteResult"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          $ref: "#/components/responses/CmsNotFound"

  /cms/tags:
    post:
      tags: [cms]
      operationId: createCmsTag
      summary: Create a tag (requires taxonomy.manage)
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmsTagInput"
      responses:
        "201":
          description: The created tag.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/tags/{id}:
    put:
      tags: [cms]
      operationId: updateCmsTag
      summary: Update a tag (requires taxonomy.manage)
      parameters:
        - $ref: "#/components/parameters/CmsIdParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmsTagInput"
      responses:
        "200":
          description: The updated tag.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          $ref: "#/components/responses/CmsNotFound"
    delete:
      tags: [cms]
      operationId: deleteCmsTag
      summary: Delete a tag (requires taxonomy.manage)
      parameters:
        - $ref: "#/components/parameters/CmsIdParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Deletion result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsDeleteResult"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          $ref: "#/components/responses/CmsNotFound"

  /cms/export:
    get:
      tags: [cms]
      operationId: exportCmsContent
      summary: Export the whole corpus in one format (requires content.view)
      parameters:
        - name: format
          in: query
          required: false
          description: The serialization format.
          schema:
            type: string
            enum: [json, csv, markdown, sql, payload]
            default: json
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: A single download envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentExportFile"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/export/full:
    get:
      tags: [cms]
      operationId: exportCmsContentFull
      summary: One-click export in every supported format (requires content.view)
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Download envelopes for every format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentExportBundle"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/import:
    post:
      tags: [cms]
      operationId: importCmsContent
      summary: Import content from a supported format (requires content.create)
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentImportInput"
      responses:
        "200":
          description: A summary of what was upserted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentImportResult"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/backup:
    get:
      tags: [cms]
      operationId: backupCmsContent
      summary: Download a full JSON backup of the corpus (requires settings.manage)
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: A JSON backup download envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentExportFile"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/restore:
    post:
      tags: [cms]
      operationId: restoreCmsContent
      summary: Restore the corpus from a JSON backup (requires settings.manage)
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentRestoreInput"
      responses:
        "200":
          description: A summary of what was restored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentImportResult"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/payload-mapping:
    get:
      tags: [cms]
      operationId: getCmsPayloadMapping
      summary: Payload collection/block mappings + live migration report (requires content.view)
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: The Payload compatibility surface.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayloadMappingResponse"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/search:
    get:
      tags: [cms]
      operationId: searchCmsContent
      summary: Global multi-field content search across all statuses (requires content.view)
      description: >-
        Fuzzy search across every content field (title, slug, URL, author,
        category, tags, body, CTA, SEO, FAQ, breadcrumbs, JSON-LD, internal and
        external links) with filters, sort and pagination. Unlike the public
        `/search`, this spans drafts and non-post pages for staff.
      parameters:
        - name: q
          in: query
          required: false
          description: Search query (omit to browse with filters only).
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, published, archived]
        - name: pageType
          in: query
          required: false
          schema:
            type: string
            enum: [post, page, category, author, tag, landing, web-story]
        - name: language
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          description: Category slug filter.
          schema:
            type: string
        - name: author
          in: query
          required: false
          description: Author slug filter.
          schema:
            type: string
        - name: tag
          in: query
          required: false
          description: Tag slug filter (repeatable).
          schema:
            type: array
            items:
              type: string
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [relevance, title, published, updated, created]
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: A paginated list of matching content.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsSearchResponse"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/saved-views:
    get:
      tags: [cms]
      operationId: listSavedViews
      summary: List the current user's saved search views (requires content.view)
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: The user's saved views.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedViewListResponse"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
    post:
      tags: [cms]
      operationId: createSavedView
      summary: Create a saved search view for the current user (requires content.view)
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedViewInput"
      responses:
        "201":
          description: The created saved view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedView"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"

  /cms/saved-views/{id}:
    patch:
      tags: [cms]
      operationId: updateSavedView
      summary: Update one of the current user's saved views (requires content.view)
      parameters:
        - $ref: "#/components/parameters/CmsIdParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedViewUpdate"
      responses:
        "200":
          description: The updated saved view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedView"
        "400":
          $ref: "#/components/responses/CmsBadRequest"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          $ref: "#/components/responses/CmsNotFound"
    delete:
      tags: [cms]
      operationId: deleteSavedView
      summary: Delete one of the current user's saved views (requires content.view)
      parameters:
        - $ref: "#/components/parameters/CmsIdParam"
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Deletion result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsDeleteResult"
        "401":
          $ref: "#/components/responses/CmsUnauthorized"
        "403":
          $ref: "#/components/responses/CmsForbidden"
        "404":
          $ref: "#/components/responses/CmsNotFound"


components:
  parameters:
    SlugParam:
      name: slug
      in: path
      required: true
      description: The resource slug (public identifier)
      schema:
        type: string
    PageParam:
      name: page
      in: query
      required: false
      description: 1-based page number
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      required: false
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 12
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
    CmsIdParam:
      name: id
      in: path
      required: true
      description: The internal resource id (UUID). CMS routes address rows by id, not slug.
      schema:
        type: string
        format: uuid

  responses:
    CmsBadRequest:
      description: Invalid request body.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    CmsUnauthorized:
      description: Not authenticated.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    CmsForbidden:
      description: Insufficient permissions.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    CmsNotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    CmsSeoMeta:
      type: object
      properties:
        metaTitle:
          type: ["string", "null"]
        metaDescription:
          type: ["string", "null"]
        canonicalUrl:
          type: ["string", "null"]
        robots:
          type: ["string", "null"]
        focusKeyword:
          type: ["string", "null"]
        keywords:
          type: ["array", "null"]
          items:
            type: string
        ogTitle:
          type: ["string", "null"]
        ogDescription:
          type: ["string", "null"]
        ogImage:
          type: ["string", "null"]
        ogType:
          type: ["string", "null"]
        twitterCard:
          type: ["string", "null"]
        twitterTitle:
          type: ["string", "null"]
        twitterDescription:
          type: ["string", "null"]
        twitterImage:
          type: ["string", "null"]
        needsReview:
          type: boolean
      required:
        - needsReview

    CmsLink:
      type: object
      properties:
        id:
          type: string
          format: uuid
        href:
          type: string
        anchorText:
          type: ["string", "null"]
        rel:
          type: ["string", "null"]
        domain:
          type: ["string", "null"]
        position:
          type: integer
      required:
        - href
        - position

    CmsGallery:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: ["string", "null"]
        layout:
          type: ["string", "null"]
        position:
          type: integer
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageItem"
      required:
        - position
        - images

    CmsPostDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        status:
          $ref: "#/components/schemas/PageStatus"
        pageType:
          type: string
        title:
          type: string
        subtitle:
          type: ["string", "null"]
        excerpt:
          type: ["string", "null"]
        canonicalUrl:
          type: string
        pathname:
          type: string
        parentPath:
          type: ["string", "null"]
        featuredImageUrl:
          type: ["string", "null"]
        featuredImageAlt:
          type: ["string", "null"]
        readingTimeMinutes:
          type: ["integer", "null"]
        wordCount:
          type: ["integer", "null"]
        language:
          type: string
        publishedAt:
          type: ["string", "null"]
          format: date-time
        modifiedAt:
          type: ["string", "null"]
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time
        contentHtml:
          type: ["string", "null"]
        richText:
          type: ["object", "null"]
          additionalProperties: true
        componentTree:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: "null"
        author:
          oneOf:
            - $ref: "#/components/schemas/AuthorSummary"
            - type: "null"
        primaryCategory:
          oneOf:
            - $ref: "#/components/schemas/CategorySummary"
            - type: "null"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategorySummary"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagSummary"
        breadcrumbs:
          type: array
          items:
            $ref: "#/components/schemas/Breadcrumb"
        faq:
          type: array
          items:
            $ref: "#/components/schemas/FaqItem"
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageItem"
        galleries:
          type: array
          items:
            $ref: "#/components/schemas/CmsGallery"
        seo:
          oneOf:
            - $ref: "#/components/schemas/CmsSeoMeta"
            - type: "null"
        jsonld:
          type: array
          items:
            $ref: "#/components/schemas/JsonLdItem"
        internalLinks:
          type: array
          items:
            $ref: "#/components/schemas/CmsLink"
        externalLinks:
          type: array
          items:
            $ref: "#/components/schemas/CmsLink"
        latestVersion:
          type: ["integer", "null"]
      required:
        - id
        - slug
        - status
        - pageType
        - title
        - canonicalUrl
        - pathname
        - language
        - categories
        - tags
        - breadcrumbs
        - faq
        - images
        - galleries
        - jsonld
        - internalLinks
        - externalLinks

    PageStatus:
      type: string
      enum:
        - draft
        - published
        - archived

    CmsImageInput:
      type: object
      properties:
        url:
          type: string
        originalUrl:
          type: ["string", "null"]
        alt:
          type: ["string", "null"]
        title:
          type: ["string", "null"]
        caption:
          type: ["string", "null"]
        credit:
          type: ["string", "null"]
        width:
          type: ["integer", "null"]
        height:
          type: ["integer", "null"]
        mimeType:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
        position:
          type: integer
          default: 0
      required:
        - url

    CmsGalleryInput:
      type: object
      properties:
        title:
          type: ["string", "null"]
        layout:
          type: ["string", "null"]
        position:
          type: integer
          default: 0
        images:
          type: array
          items:
            $ref: "#/components/schemas/CmsImageInput"
      required:
        - images

    CmsFaqInput:
      type: object
      properties:
        question:
          type: string
        answer:
          type: string
        position:
          type: integer
          default: 0
      required:
        - question
        - answer

    CmsBreadcrumbInput:
      type: object
      properties:
        label:
          type: string
        url:
          type: ["string", "null"]
        position:
          type: integer
          default: 0
      required:
        - label

    CmsJsonLdInput:
      type: object
      properties:
        type:
          type: ["string", "null"]
        data:
          type: object
          additionalProperties: true
      required:
        - data

    CmsLinkInput:
      type: object
      properties:
        href:
          type: string
        anchorText:
          type: ["string", "null"]
        rel:
          type: ["string", "null"]
        domain:
          type: ["string", "null"]
        position:
          type: integer
          default: 0
      required:
        - href

    CmsSeoInput:
      type: object
      properties:
        metaTitle:
          type: ["string", "null"]
        metaDescription:
          type: ["string", "null"]
        canonicalUrl:
          type: ["string", "null"]
        robots:
          type: ["string", "null"]
        focusKeyword:
          type: ["string", "null"]
        keywords:
          type: ["array", "null"]
          items:
            type: string
        ogTitle:
          type: ["string", "null"]
        ogDescription:
          type: ["string", "null"]
        ogImage:
          type: ["string", "null"]
        ogType:
          type: ["string", "null"]
        twitterCard:
          type: ["string", "null"]
        twitterTitle:
          type: ["string", "null"]
        twitterDescription:
          type: ["string", "null"]
        twitterImage:
          type: ["string", "null"]
        needsReview:
          type: boolean

    CmsPostInput:
      type: object
      description: >-
        Full create/replace payload for an article. On update (PUT) all nested
        collections are rewritten wholesale to match the payload.
      properties:
        title:
          type: string
          minLength: 1
        slug:
          type: string
          description: Optional; derived from the title when omitted on create.
        subtitle:
          type: ["string", "null"]
        excerpt:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/PageStatus"
        language:
          type: string
          default: en
        canonicalUrl:
          type: ["string", "null"]
        pathname:
          type: ["string", "null"]
        parentPath:
          type: ["string", "null"]
        authorId:
          type: ["string", "null"]
          format: uuid
        primaryCategoryId:
          type: ["string", "null"]
          format: uuid
        categoryIds:
          type: array
          items:
            type: string
            format: uuid
        tagIds:
          type: array
          items:
            type: string
            format: uuid
        featuredImageUrl:
          type: ["string", "null"]
        featuredImageAlt:
          type: ["string", "null"]
        contentHtml:
          type: ["string", "null"]
        richText:
          type: ["object", "null"]
          additionalProperties: true
        componentTree:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: "null"
        readingTimeMinutes:
          type: ["integer", "null"]
        wordCount:
          type: ["integer", "null"]
        publishedAt:
          type: ["string", "null"]
          format: date-time
        seo:
          oneOf:
            - $ref: "#/components/schemas/CmsSeoInput"
            - type: "null"
        faq:
          type: array
          items:
            $ref: "#/components/schemas/CmsFaqInput"
        breadcrumbs:
          type: array
          items:
            $ref: "#/components/schemas/CmsBreadcrumbInput"
        jsonld:
          type: array
          items:
            $ref: "#/components/schemas/CmsJsonLdInput"
        images:
          type: array
          items:
            $ref: "#/components/schemas/CmsImageInput"
        galleries:
          type: array
          items:
            $ref: "#/components/schemas/CmsGalleryInput"
        internalLinks:
          type: array
          items:
            $ref: "#/components/schemas/CmsLinkInput"
        externalLinks:
          type: array
          items:
            $ref: "#/components/schemas/CmsLinkInput"
        changeSummary:
          type: string
          description: Optional human note stored on the version snapshot.
      required:
        - title

    CmsScaffoldInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        slug:
          type: string
      required:
        - title

    CmsDuplicateInput:
      type: object
      properties:
        title:
          type: ["string", "null"]
          description: Title for the copy; defaults to "<original title> (Copy)".
        slug:
          type: ["string", "null"]
          description: Slug for the copy; auto-generated and uniquified when omitted.

    CmsAuthorInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        originalUrl:
          type: ["string", "null"]
        social:
          type: ["object", "null"]
          additionalProperties:
            type: string
      required:
        - name

    CmsCategoryInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
        description:
          type: ["string", "null"]
        parentId:
          type: ["string", "null"]
          format: uuid
        path:
          type: ["string", "null"]
        originalUrl:
          type: ["string", "null"]
      required:
        - name

    CmsTagInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
        description:
          type: ["string", "null"]
        originalUrl:
          type: ["string", "null"]
      required:
        - name

    CmsDeleteResult:
      type: object
      properties:
        success:
          type: boolean
        id:
          type: string
          format: uuid
      required:
        - success
        - id

